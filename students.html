<!DOCTYPE html>
<html>

<head>

<title>Students</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">
📋 Student Records
</h2>

<table class="table table-striped table-hover shadow">

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>University</th>
<th>Subject</th>
<th>Marks</th>
<th>Percentage</th>
<th>Grade</th>

</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>
<td>{{ student[4] }}</td>
<td>{{ student[5] }}</td>
<td>{{ student[6] }}%</td>
<td>{{ student[7] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
