<!DOCTYPE html>
<html>
<head>

<title>Fee Status</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>💰 Student Fee Status</h2>

<form method="POST">

<input
type="number"
name="id"
class="form-control"
placeholder="Enter Student ID"
required>

<button class="btn btn-primary mt-3">
Check Fee Status
</button>

</form>

</div>

{% if student %}

<div class="card shadow mt-4 p-4">

<h3>{{ student[1] }}</h3>

<hr>

<p><b>Total Fees:</b> ₹{{ student[8] }}</p>

<p><b>Fees Paid:</b> ₹{{ student[9] }}</p>

<p><b>Remaining:</b> ₹{{ student[10] }}</p>

<p><b>Status:</b> {{ student[11] }}</p>

</div>

{% endif %}

</div>

</body>
</html>
